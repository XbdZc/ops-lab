# roles/docker_install/tasks/main.yml
- name: 安装 Docker 核心组件
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: 将当前连接用户加入 docker 组
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: 刷新 SSH 连接以使组权限立即生效
  ansible.builtin.meta: reset_connection