- name: 校验 docker_repo 仅在 Ubuntu 执行
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
    fail_msg: "当前 docker_repo role 仅支持 Ubuntu，Debian 需要单独定义仓库地址"

- name: 卸载冲突软件包
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
    purge: yes
  loop:
    - docker.io
    - docker-doc
    - docker-compose
    - docker-compose-v2
    - podman-docker
    - containerd
    - runc

- name: 安装依赖工具
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
    state: present
    update_cache: yes

- name: 创建 GPG key 目录
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: 添加 Docker GPG 密钥
  ansible.builtin.get_url:
    url: https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    timeout: 30

- name: 归一化 Docker 仓库架构名称
  ansible.builtin.set_fact:
    docker_repo_arch: >-
      {{
        'amd64' if ansible_architecture in ['x86_64', 'amd64']
        else 'arm64' if ansible_architecture in ['aarch64', 'arm64']
        else ansible_architecture
      }}

- name: 添加 Docker APT 仓库
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_repo_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://mirrors.aliyun.com/docker-ce/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: 强制更新 APT 缓存
  ansible.builtin.apt:
    update_cache: yes
    force: yes
