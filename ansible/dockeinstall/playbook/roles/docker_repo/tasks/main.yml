# roles/docker_repo/tasks/main.yml
- name: 卸载冲突软件包
  apt:
    name: "{{ item }}"
    state: absent
    purge: yes
  loop:
    - docker.io
    - docker-doc
    - docker-compose
    - docker-compose-v2
    - podman-docker
    - containerd
    - runc

- name: 安装依赖工具（包含 lsb-release）
  apt:
    name: ["ca-certificates", "curl", "gnupg", "software-properties-common", "lsb-release"]
    state: present
    update_cache: yes

- name: 创建 GPG 密钥目录
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: 0755

- name: 添加 Docker GPG 密钥
  get_url:
    url: https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: 0644
    timeout: 30

- name: 获取 Ubuntu 版本代码名称
  shell: |
    . /etc/os-release
    echo "${VERSION_CODENAME}"
  register: ubuntu_codename
  changed_when: false

- name: 添加 Docker APT 仓库
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://mirrors.aliyun.com/docker-ce/linux/ubuntu {{ ubuntu_codename.stdout }} stable"
    state: present
    filename: docker

- name: 强制更新 APT 缓存
  apt:
    update_cache: yes
    force: yes  # 确保强制刷新