---
- name: proxy | remove netplan custom
  ansible.builtin.file:
    path: "{{ netplan_toggle_custom_netplan_file }}"
    state: absent
  notify: "netplan apply"

- name: proxy | remove networkd drop-in (eth0)
  ansible.builtin.file:
    path: "{{ netplan_toggle__eth0_dropin_file }}"
    state: absent
  notify: "netplan apply"

- name: proxy | apply now
  ansible.builtin.meta: flush_handlers

- name: proxy | check IPv4 default routes on eth1
  ansible.builtin.command: ip -4 route show default dev {{ netplan_toggle_eth1_if }}
  register: _eth1_default_routes
  changed_when: false
  failed_when: false

- name: proxy | delete stale IPv4 default route(s) on eth1
  ansible.builtin.shell: |
    set -euo pipefail
    for i in $(seq 1 10); do
      if ip -4 route show default dev {{ netplan_toggle_eth1_if }} | grep -q .; then
        ip -4 route del default dev {{ netplan_toggle_eth1_if }} 2>/dev/null || true
      else
        break
      fi
    done
    ip -4 route flush cache 2>/dev/null || true
  args:
    executable: /bin/bash
  when:
    - not ansible_check_mode
    - (_eth1_default_routes.stdout | trim) != ""
  changed_when: true

# ---- appended: force-enable DHCP routes and fallback-add IPv4 default route on eth0 ----
- name: proxy | apply now (ensure netplan changes already applied)
  ansible.builtin.meta: flush_handlers

- name: proxy | ensure drop-in dir exists (eth0)
  ansible.builtin.file:
    path: "{{ netplan_toggle__eth0_dropin_dir }}"
    state: directory
    mode: "0755"

- name: proxy | install networkd drop-in to ENABLE DHCP routes/dns on eth0
  ansible.builtin.copy:
    dest: "{{ netplan_toggle__eth0_dropin_file }}"
    mode: "0644"
    content: |
      [DHCP]
      UseRoutes=yes
      UseGateway=yes
      UseDNS=yes

      [DHCPv4]
      UseRoutes=yes
      UseGateway=yes
      UseDNS=yes

- name: proxy | restart systemd-networkd to reload drop-in
  ansible.builtin.command: systemctl restart systemd-networkd

- name: proxy | reconfigure eth0 (ignore errors)
  ansible.builtin.command: "networkctl reconfigure {{ netplan_toggle_eth0_if }}"
  changed_when: false
  failed_when: false

- name: proxy | renew eth0 DHCP (ignore if unsupported)
  ansible.builtin.command: "networkctl renew {{ netplan_toggle_eth0_if }}"
  changed_when: false
  failed_when: false

- name: proxy | check IPv4 default route on eth0
  ansible.builtin.command: "ip -4 route show default dev {{ netplan_toggle_eth0_if }}"
  register: _eth0_def
  changed_when: false

- name: proxy | read DHCP ROUTER from systemd lease (eth0)
  ansible.builtin.shell: |
    set -e
    IF="{{ netplan_toggle_eth0_if }}"
    IDX="$(cat /sys/class/net/${IF}/ifindex)"
    LEASE="/run/systemd/netif/leases/${IDX}"
    awk -F= '$1=="ROUTER"{print $2; exit}' "${LEASE}"
  register: _eth0_router
  changed_when: false
  when: _eth0_def.stdout | trim == ""

- name: proxy | install fallback IPv4 default route on eth0 (workaround)
  ansible.builtin.command: >
    ip -4 route replace default via {{ _eth0_router.stdout | trim }}
    dev {{ netplan_toggle_eth0_if }} metric 10
  when:
    - _eth0_def.stdout | trim == ""
    - (_eth0_router.stdout | default('') | trim) != ""

- name: proxy | verify IPv4 default route on eth0
  ansible.builtin.command: "ip -4 route show default dev {{ netplan_toggle_eth0_if }}"
  register: _eth0_def2
  changed_when: false
  failed_when: _eth0_def2.stdout | trim == ""

# ---- appended: prevent eth1 from being a default route in proxy mode ----
- name: proxy | detect eth1 Network File path
  ansible.builtin.shell: |
    set -e
    IF="{{ netplan_toggle_eth1_if | default('eth1') }}"
    networkctl status "${IF}" --no-pager | awk -F': ' '/Network File:/ {print $2; exit}'
  register: _eth1_netfile
  changed_when: false

- name: proxy | ensure drop-in dir exists (eth1)
  ansible.builtin.file:
    path: "{{ _eth1_netfile.stdout | trim }}.d"
    state: directory
    mode: "0755"
  when: (_eth1_netfile.stdout | default('') | trim) != ""

- name: proxy | install networkd drop-in to CLEAR Gateway on eth1 (no IPv4 default)
  ansible.builtin.copy:
    dest: "{{ _eth1_netfile.stdout | trim }}.d/10-netplan_toggle-no-default-gw.conf"
    mode: "0644"
    content: |
      [Network]
      Gateway=
  when: (_eth1_netfile.stdout | default('') | trim) != ""

- name: proxy | reconfigure eth1 to apply drop-in (ignore errors)
  ansible.builtin.command: "networkctl reconfigure {{ netplan_toggle_eth1_if | default('eth1') }}"
  changed_when: false
  failed_when: false

- name: proxy | delete stale IPv4 default route(s) on eth1 (final cleanup)
  ansible.builtin.shell: |
    set -e
    IF="{{ netplan_toggle_eth1_if | default('eth1') }}"
    while ip -4 route del default dev "${IF}" 2>/dev/null; do :; done
  changed_when: false

# ---- appended: persist routing mode across reboot (systemd oneshot) ----
- name: persist | ensure state dir
  ansible.builtin.file:
    path: /etc/netplan_toggle
    state: directory
    mode: "0755"

- name: persist | install enforce script
  ansible.builtin.copy:
    dest: /usr/local/sbin/netplan-toggle-enforce.sh
    mode: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      MODE_FILE=/etc/netplan_toggle/mode
      MODE="direct"
      if [[ -f "$MODE_FILE" ]]; then
        MODE="$(tr -d ' \t\r\n' < "$MODE_FILE" || true)"
      fi

      ETH0="{{ netplan_toggle_eth0_if }}"
      ETH1="{{ netplan_toggle_eth1_if | default('eth1') }}"

      if [[ "$MODE" == "proxy" ]]; then
        # 1) always remove eth1 default
        while ip -4 route del default dev "$ETH1" 2>/dev/null; do :; done

        # 2) ensure eth0 default exists (read DHCP ROUTER from systemd lease)
        gw=""
        for i in {1..30}; do
          if [[ -e "/sys/class/net/${ETH0}/ifindex" ]]; then
            idx="$(cat /sys/class/net/${ETH0}/ifindex || true)"
            lease="/run/systemd/netif/leases/${idx}"
            if [[ -f "$lease" ]]; then
              gw="$(awk -F= '$1=="ROUTER"{print $2; exit}' "$lease" || true)"
              [[ -n "$gw" ]] && break
            fi
          fi
          sleep 1
        done

        if [[ -n "$gw" ]]; then
          ip -4 route replace default via "$gw" dev "$ETH0" metric 10
        fi

        # final cleanup
        while ip -4 route del default dev "$ETH1" 2>/dev/null; do :; done
        ip -4 route flush cache || true
      else
        # direct: ensure eth0 doesn't steal default (eth1 default is handled by netplan)
        while ip -4 route del default dev "$ETH0" 2>/dev/null; do :; done
        ip -4 route flush cache || true
      fi

- name: persist | install systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/netplan-toggle-enforce.service
    mode: "0644"
    content: |
      [Unit]
      Description=Netplan toggle enforce default route (direct/proxy)
      After=systemd-networkd.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/netplan-toggle-enforce.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target

- name: persist | set mode file (proxy)
  ansible.builtin.copy:
    dest: /etc/netplan_toggle/mode
    mode: "0644"
    content: "proxy\n"

- name: persist | daemon-reload
  ansible.builtin.command: systemctl daemon-reload
  changed_when: false

- name: persist | enable service
  ansible.builtin.command: systemctl enable netplan-toggle-enforce.service
  changed_when: false

- name: persist | run enforce once now
  ansible.builtin.command: systemctl start netplan-toggle-enforce.service
  changed_when: false
